<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dorm Management System - Login</title>
  <style>
    :root {
      --blue-strong: #1f5eff;
      --blue-soft: #eaf1ff;
      --blue-mid: #3f7dff;
      --text-dark: #1e2a44;
      --text-muted: #5b6b8a;
      --white: #ffffff;
      --border: #d9e4ff;
      --shadow: 0 16px 35px rgba(31, 94, 255, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f9fbff 0%, #eaf1ff 100%);
      color: var(--text-dark);
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 34px 28px 30px;
      box-shadow: var(--shadow);
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-wrap {
      width: 74px;
      height: 74px;
      margin: 0 auto 14px;
      border-radius: 50%;
      background: #ffffff;
      display: grid;
      place-items: center;
      border: 2px solid #b8ceff;
    }

    .logo-wrap svg {
      width: 40px;
      height: 40px;
      fill: #1f5eff;
    }

    h1 {
      font-size: 1.4rem;
      color: var(--blue-strong);
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      font-size: 0.88rem;
      color: var(--text-dark);
      margin-bottom: 6px;
      display: inline-block;
      font-weight: 600;
    }

    .field-group input {
      width: 100%;
      border: 1px solid var(--border);
      background: #fbfdff;
      color: var(--text-dark);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field-group input:focus {
      border-color: var(--blue-mid);
      box-shadow: 0 0 0 3px rgba(63, 125, 255, 0.17);
      background: var(--white);
    }

    .login-btn {
      margin-top: 6px;
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--white);
      background: linear-gradient(90deg, #2f6bff, #1f5eff);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 20px rgba(31, 94, 255, 0.3);
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(31, 94, 255, 0.35);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-error {
      min-height: 18px;
      font-size: 0.84rem;
      color: #d12c2c;
      text-align: center;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 28px 22px 24px;
      }
    }
  </style>
</head>
<body>
  <main class="login-card">
    <section class="header">
      <div class="logo-wrap" aria-hidden="true">
        <svg viewBox="0 0 24 24" role="img">
          <path d="M12 3 2 10h2v10h6v-6h4v6h6V10h2L12 3zm0 2.4 6.8 4.6V18h-2v-6H7.2v6h-2v-8z"/>
        </svg>
      </div>
      <h1>Dorm Management System</h1>
      <p class="subtitle">Sign in to continue</p>
    </section>

    <form id="login-form">
      <div class="field-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required>
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <button class="login-btn" type="submit">Login</button>
      <p id="login-error" class="login-error"></p>
    </form>
  </main>
  <script>
    const loginForm = document.getElementById("login-form");
    const loginError = document.getElementById("login-error");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");

    loginForm.addEventListener("submit", function (event) {
      event.preventDefault();
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      if (username === "admin" && password === "admin123") {
        localStorage.setItem("dmsUsername", username);
        window.location.href = "dashboard.html";
        return;
      }
      loginError.textContent = "Invalid credentials. Use admin / admin123.";
    });
  </script>
</body>
</html>
